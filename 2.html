<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body{
      margin: 0;
      font-family: fantasy;
      background:rgb(216, 231, 230) ;
    }

    header{
      text-align: start;
      padding: auto;
      font-size: 50px;
      font-weight: 100;
      font-family: cursive;
      animation:forwards;
    }
    .header:hover{
      transform: rotate3d(5px);
      animation-timing-function: cubic-bezier(0.19, 1, 0.22, 1);

    }

    
    
    .container{
      display: block;
      grid-template-columns: min-content;
      row-gap: 30px;
      width:40;
    }

    .card{
     background:rgba(red, green, blue, alpha) ;
      transition:all  .45s;
      backdrop-filter: blur(10px);
      padding: 25px;
     border-radius:10px;
     border:1px rgb(212, 182, 34);
    }

    .card:hover{
      transform:translateX(-10px);
      box-shadow: 0 15px;
      animation: aboutGlow infinite alternate;
    }
  </style>
</head>
<body>
  <div class="">
  <header>Hi im karibasu</header>

  </div>
  <h2>see all blogs</h1>
    <p>Hi! I'M<b>karibasu jadar</b></p>

  
</body>
</html>
